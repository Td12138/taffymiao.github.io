<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Start</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f4ee;
            --card: #fffdf8;
            --text: #1f1a14;
            --muted: #6e655b;
            --line: rgba(31, 26, 20, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Georgia, "Times New Roman", serif;
            background: linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
            color: var(--text);
        }

        main {
            width: min(100%, 720px);
            padding: 48px 32px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--card);
            box-shadow: 0 18px 50px rgba(60, 45, 24, 0.08);
        }

        p {
            color: var(--muted);
            line-height: 1.8;
        }

        .label {
            margin-bottom: 18px;
            font: 12px/1.2 Arial, sans-serif;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        h1 {
            margin-bottom: 16px;
            font-size: clamp(42px, 8vw, 72px);
            line-height: 0.98;
            font-weight: 500;
        }

        .note {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--line);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <main>
        <p class="label">Simple page</p>
        <h1>Hello, world.</h1>
        <p>This repository has been reset and replaced with a minimal single-page site.</p>
        <p class="note">Nothing fancy here, just a clean blank start.</p>
    </main>
</body>
</html>
